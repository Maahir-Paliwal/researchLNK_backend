spring:
  application:
    name: researchlnk_backend
  datasource:
    url: jdbc:postgresql://localhost:5433/researchlnk_db
    username: researchlnk_user
    password: researchlnk_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  docker:
    compose:
      enabled: true
